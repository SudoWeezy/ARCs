name: Trigger Devportal Update

on:
  push:
    branches:
      - main
    paths:
      - "ARCs/**"

jobs:
  notifyDevportal:
    runs-on: ubuntu-latest

    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }} # This token must have repo scope and must be set in your ARC's repo secrets
          repository: SudoWeezy/devportal # Target repository
          event-type: update-arcs # This should match the type in the devportal repository's workflow
